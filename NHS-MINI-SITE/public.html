<!DOCTYPE html><html lang="en-GB"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>OTOS Continuity™ — Private Access</title><meta name="description" content="OTOS Continuity protected hub"/><meta name="robots" content="noindex, nofollow"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="css/otos-hub.css"/></head><body class="public-body"><main class="public-card"><img class="public-logo" src="images/otos-logo.png" alt="OTOS Continuity" onerror="this.src='images/brain-icon.png'"/><h1 class="public-title">The thread that holds<br/>the journey together.</h1><p class="public-subtitle">Continuity infrastructure for complex human journeys — making handoffs visible, follow-through receipted, and disengagement detectable before it becomes crisis.</p><section class="gate-box"><form class="gate-form" id="gate-form"><input id="access-code" type="password" placeholder="Access code" autocomplete="current-password"/><button type="submit">Enter →</button></form><div class="gate-error" id="gate-error"></div><p class="gate-note">For authorised partners and invited guests only.</p></section></main><script>const ACCESS_CODES=['otos','continuity'];document.getElementById('gate-form').addEventListener('submit',e=>{e.preventDefault();const code=document.getElementById('access-code').value.trim().toLowerCase();if(ACCESS_CODES.some(x=>x.toLowerCase()===code)){sessionStorage.setItem('otos_access','1');sessionStorage.setItem('otos_show_quote','1');location.href='index.html'}else document.getElementById('gate-error').textContent='Access code not recognised.'});</script></body></html>
